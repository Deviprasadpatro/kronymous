name: Clinical Orchestrator CI

on:
  push:
    branches: [main, master]
    paths:
      - "clinical_orchestrator/**"
      - ".github/workflows/clinical-orchestrator.yml"
  pull_request:
    paths:
      - "clinical_orchestrator/**"
      - ".github/workflows/clinical-orchestrator.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clinical_orchestrator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Run tests
        run: pytest -q
